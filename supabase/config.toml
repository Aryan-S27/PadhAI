# supabase/config.toml
# Project config for Supabase CLI.
# Your project ref is: zbfqidnjspzruabgazvx  (from your .env VITE_SUPABASE_URL)

# [project]
# project_id = "zbfqidnjspzruabgazvx"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
# Storage bucket for PDF uploads
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:5173"
additional_redirect_urls = ["http://localhost:5174"]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false   # set true in production

[functions]
# All Edge Functions in supabase/functions/
# Deploy with: npx supabase functions deploy <name>
